<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">RC4 KSA and PRGA flow</title>
  <desc id="desc">RC4 initializes a 256 byte state with the key, generates a keystream, and XORs it with plaintext or ciphertext.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .key { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10; }
      .state { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; rx: 10; }
      .out { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="360"/>
  <text class="text" x="40" y="45" font-weight="700">RC4 / ARC4 flow</text>
  <rect class="key" x="40" y="85" width="160" height="82"/>
  <text class="text" x="83" y="119">Key</text>
  <text class="small" x="63" y="145">1-256 bytes</text>
  <rect class="state" x="260" y="85" width="190" height="82"/>
  <text class="text" x="315" y="116">KSA</text>
  <text class="small" x="286" y="143">shuffle S[0..255]</text>
  <rect class="state" x="520" y="85" width="190" height="82"/>
  <text class="text" x="573" y="116">PRGA</text>
  <text class="small" x="551" y="143">output keystream</text>
  <rect class="box" x="780" y="85" width="160" height="82"/>
  <text class="text" x="817" y="116">XOR</text>
  <text class="small" x="805" y="143">P/C with Kstream</text>
  <line class="arrow" x1="200" y1="126" x2="252" y2="126"/>
  <line class="arrow" x1="450" y1="126" x2="512" y2="126"/>
  <line class="arrow" x1="710" y1="126" x2="772" y2="126"/>
  <rect class="box" x="40" y="230" width="205" height="74"/>
  <text class="text" x="77" y="260">Plaintext</text>
  <text class="small" x="63" y="286">or ciphertext</text>
  <line class="arrow" x1="245" y1="267" x2="772" y2="152"/>
  <rect class="out" x="780" y="230" width="160" height="74"/>
  <text class="text" x="809" y="260">Output</text>
  <text class="small" x="805" y="286">same operation</text>
  <line class="arrow" x1="860" y1="168" x2="860" y2="222"/>
  <text class="small" x="284" y="205">Encrypt and decrypt are identical: data XOR keystream.</text>
</svg>


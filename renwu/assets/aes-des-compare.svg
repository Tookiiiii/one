<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470" role="img" aria-labelledby="title desc">
  <title id="title">AES and DES structure comparison</title>
  <desc id="desc">DES uses a Feistel network while AES uses an SPN state transformation. Both need block modes for long messages.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .des { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .aes { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 10; }
      .mode { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1080" height="470"/>
  <text class="text" x="40" y="42" font-weight="700">DES vs AES: same block-cipher shell, different core</text>
  <rect class="des" x="55" y="85" width="440" height="220"/>
  <text class="text" x="225" y="120" font-weight="700">DES</text>
  <text class="small" x="90" y="150">64-bit block, 56-bit effective key, 16 rounds</text>
  <rect class="des" x="95" y="180" width="130" height="58"/>
  <text class="small" x="140" y="214">L</text>
  <rect class="des" x="255" y="180" width="130" height="58"/>
  <text class="small" x="300" y="214">R</text>
  <line class="arrow" x1="225" y1="209" x2="247" y2="209"/>
  <text class="small" x="111" y="270">Feistel: Li = R(i-1), Ri = L(i-1) XOR F(R, Ki)</text>
  <rect class="aes" x="585" y="85" width="440" height="220"/>
  <text class="text" x="755" y="120" font-weight="700">AES</text>
  <text class="small" x="620" y="150">128-bit block, 128/192/256-bit key, 10/12/14 rounds</text>
  <rect class="aes" x="640" y="178" width="330" height="38"/>
  <text class="small" x="688" y="203">SubBytes -> ShiftRows -> MixColumns</text>
  <rect class="aes" x="710" y="238" width="190" height="38"/>
  <text class="small" x="755" y="263">AddRoundKey</text>
  <line class="arrow" x1="805" y1="216" x2="805" y2="230"/>
  <rect class="mode" x="160" y="360" width="760" height="70"/>
  <text class="text" x="220" y="392">Modes connect blocks: ECB, CBC, CTR, GCM</text>
  <text class="small" x="220" y="418">Most CTF bugs are mode bugs: ECB leakage, CBC bit flipping, padding oracle, nonce reuse.</text>
</svg>


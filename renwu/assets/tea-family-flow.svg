<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-labelledby="title desc">
  <title id="title">TEA family relationship</title>
  <desc id="desc">TEA processes two 32-bit words, XTEA improves key indexing, and XXTEA processes an array of 32-bit words.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .tea { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .xtea { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .xxtea { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1080" height="430"/>
  <text class="text" x="40" y="42" font-weight="700">TEA family evolution</text>
  <rect class="tea" x="55" y="90" width="270" height="145"/>
  <text class="text" x="162" y="123" font-weight="700">TEA</text>
  <text class="small" x="86" y="154">Block: v0, v1 = 64 bit</text>
  <text class="small" x="86" y="180">Key: k0, k1, k2, k3</text>
  <text class="small" x="86" y="206">Fixed key indexes</text>
  <rect class="xtea" x="405" y="90" width="270" height="145"/>
  <text class="text" x="508" y="123" font-weight="700">XTEA</text>
  <text class="small" x="436" y="154">Block: v0, v1 = 64 bit</text>
  <text class="small" x="436" y="180">key[sum &amp; 3]</text>
  <text class="small" x="436" y="206">key[(sum &gt;&gt; 11) &amp; 3]</text>
  <rect class="xxtea" x="755" y="90" width="270" height="145"/>
  <text class="text" x="852" y="123" font-weight="700">XXTEA</text>
  <text class="small" x="786" y="154">Block: v[0..n-1]</text>
  <text class="small" x="786" y="180">Rounds: 6 + 52 / n</text>
  <text class="small" x="786" y="206">MX mixes y, z, sum, key</text>
  <line class="arrow" x1="325" y1="162" x2="397" y2="162"/>
  <line class="arrow" x1="675" y1="162" x2="747" y2="162"/>
  <text class="small" x="342" y="144">key schedule</text>
  <text class="small" x="690" y="144">wide block</text>
  <rect class="box" x="100" y="300" width="880" height="78"/>
  <text class="text" x="128" y="333">Common DNA: 32-bit addition mod 2^32 + XOR + shifts + delta 0x9e3779b9</text>
  <text class="small" x="128" y="360">CTF checklist: identify variant, endian, rounds, key encoding, padding or length word.</text>
</svg>


<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">SM4 round and key schedule flow</title>
  <desc id="desc">SM4 expands a 128-bit key into 32 round keys and applies 32 rounds to four 32-bit state words.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .key { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10; }
      .round { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; rx: 10; }
      .out { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="420"/>
  <text class="text" x="40" y="42" font-weight="700">SM4 structure</text>
  <rect class="key" x="60" y="85" width="200" height="92"/>
  <text class="text" x="105" y="119">128-bit key</text>
  <text class="small" x="92" y="147">MK0 MK1 MK2 MK3</text>
  <rect class="key" x="330" y="85" width="260" height="92"/>
  <text class="text" x="395" y="119">Key schedule</text>
  <text class="small" x="367" y="147">FK, CK, T' -> rk0..rk31</text>
  <rect class="box" x="60" y="250" width="220" height="92"/>
  <text class="text" x="110" y="284">Plain block</text>
  <text class="small" x="98" y="312">X0 X1 X2 X3</text>
  <rect class="round" x="360" y="250" width="260" height="92"/>
  <text class="text" x="430" y="284">32 rounds</text>
  <text class="small" x="386" y="312">Xi+4 = Xi XOR T(Xi+1..rk)</text>
  <rect class="out" x="710" y="250" width="210" height="92"/>
  <text class="text" x="760" y="284">Cipher block</text>
  <text class="small" x="758" y="312">X35 X34 X33 X32</text>
  <line class="arrow" x1="260" y1="131" x2="322" y2="131"/>
  <line class="arrow" x1="590" y1="131" x2="490" y2="242"/>
  <line class="arrow" x1="280" y1="296" x2="352" y2="296"/>
  <line class="arrow" x1="620" y1="296" x2="702" y2="296"/>
  <text class="small" x="650" y="155">decrypt = reverse round keys</text>
</svg>
